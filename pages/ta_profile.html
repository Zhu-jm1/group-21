<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TA 个人中心 - BUPT TA System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>
<body class="bg-gray-50">
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between h-16">
<div class="flex items-center">
<span class="iconify text-blue-600 text-2xl mr-2" data-icon="mdi:school"></span>
<span class="text-lg font-bold">BUPT TA 门户</span>
</div>
<div class="flex space-x-8 items-center">
<a class="text-blue-600 border-b-2 border-blue-600 px-1 pt-1 h-16 flex items-center" href="ta_profile.html">个人资料</a>
<a class="text-gray-500 hover:text-blue-600 px-1 pt-1 h-16 flex items-center" href="ta_job_list.html">岗位大厅</a>
<a class="text-gray-500 hover:text-blue-600 px-1 pt-1 h-16 flex items-center" href="ta_applications.html">申请状态</a>
<a class="text-gray-400 hover:text-red-500 ml-4" href="index.html"><span class="iconify text-xl" data-icon="mdi:logout"></span></a>
</div>
</div>
</div>
</nav>
<main class="max-w-4xl mx-auto py-10 px-4">
<div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
<div class="bg-blue-600 h-32 relative">
<div class="absolute -bottom-12 left-8">
<img alt="Avatar" class="w-24 h-24 rounded-2xl border-4 border-white shadow-md" src="https://modao.cc/agent-py/media/generated_images/2026-03-21/d5a0fb55ee7f455f9d5bf7bc7c923a72.jpg"/>
</div>
</div>
<div class="pt-16 px-8 pb-8">
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="text-2xl font-bold">张小明</h2>
<p class="text-gray-500">学号: 2022211001 · 计算机学院</p>
</div>
<button class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-lg shadow-blue-100 flex items-center">
<span class="iconify mr-2" data-icon="mdi:content-save"></span> 保存资料
                    </button>
</div>
<form class="grid grid-cols-2 gap-6">
<div class="col-span-1">
<label class="block text-sm font-semibold text-gray-700 mb-2">中文姓名</label>
<input class="w-full px-4 py-2 border rounded-lg bg-gray-50 border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" type="text" value="张小明"/>
</div>
<div class="col-span-1">
<label class="block text-sm font-semibold text-gray-700 mb-2">专业/领域</label>
<select class="w-full px-4 py-2 border rounded-lg bg-white border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
<option>软件工程 (Software Engineering)</option>
<option>人工智能 (Artificial Intelligence)</option>
<option>物联网 (IoT)</option>
</select>
</div>
<div class="col-span-2">
<label class="block text-sm font-semibold text-gray-700 mb-2">自我推介 (个人亮点)</label>
<textarea class="w-full px-4 py-2 border rounded-lg border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="描述你的编程技能、教学经验或英语能力..." rows="4"></textarea>
</div>
<div class="col-span-2">
<label class="block text-sm font-semibold text-gray-700 mb-2">简历附件</label>
<div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center hover:border-blue-400 transition cursor-pointer bg-gray-50">
<span class="iconify text-4xl text-gray-400 mx-auto mb-2" data-icon="mdi:cloud-upload"></span>
<p class="text-gray-600">点击或将 PDF 简历拖拽至此</p>
<p class="text-xs text-gray-400 mt-1">支持格式：PDF, Word (最大 5MB)</p>
<div class="mt-4 inline-flex items-center px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 shadow-sm">
<span class="iconify mr-2" data-icon="mdi:file-pdf-box"></span> 已上传: Resume_Zhang_Sheng.pdf
                            </div>
</div>
</div>
</form>
</div>
</div>
</main>
</body>
</html>
