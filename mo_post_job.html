<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>发布招聘岗位 - BUPT TA System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
<div class="max-w-3xl mx-auto py-12 px-6">
<div class="mb-10 flex items-center justify-between">
<a class="flex items-center text-slate-500 hover:text-blue-600" href="admin_dashboard.html">
<span class="iconify mr-2 text-xl" data-icon="mdi:arrow-left"></span> 返回控制台
            </a>
<h1 class="text-2xl font-bold">发布新招聘岗位</h1>
</div>
<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-10">
<form class="space-y-8">
<div>
<label class="block text-sm font-bold text-slate-700 mb-3 tracking-wide uppercase">课程基本信息</label>
<div class="grid grid-cols-2 gap-6">
<div>
<label class="block text-xs text-slate-400 mb-1">课程代码 (如 EBU6304)</label>
<input class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="EBU" type="text"/>
</div>
<div>
<label class="block text-xs text-slate-400 mb-1">课程全称</label>
<input class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Software Engineering" type="text"/>
</div>
</div>
</div>
<div class="grid grid-cols-3 gap-6">
<div>
<label class="block text-sm font-bold text-slate-700 mb-3 tracking-wide uppercase">招聘人数</label>
<input class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition uppercase" min="1" type="number" value="1"/>
</div>
<div>
<label class="block text-sm font-bold text-slate-700 mb-3 tracking-wide uppercase">每周工时需求</label>
<select class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
<option>5-8 小时</option>
<option>8-12 小时</option>
<option>12小时以上</option>
</select>
</div>
<div>
<label class="block text-sm font-bold text-slate-700 mb-3 tracking-wide uppercase">截止日期</label>
<input class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" type="date" value="2026-03-31"/>
</div>
</div>
<div>
<label class="block text-sm font-bold text-slate-700 mb-3 tracking-wide uppercase">职位描述 (Markdown 支持)</label>
<textarea class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="请详细说明助教的工作职责..." rows="6"></textarea>
</div>
<div>
<label class="block text-sm font-bold text-slate-700 mb-3 tracking-wide uppercase">所需技能关键词</label>
<div class="flex flex-wrap gap-3 mb-4">
<span class="px-3 py-1 bg-slate-100 rounded-full flex items-center text-sm border">Java <button class="ml-2 hover:text-red-500">×</button></span>
<span class="px-3 py-1 bg-slate-100 rounded-full flex items-center text-sm border">GitHub <button class="ml-2 hover:text-red-500">×</button></span>
<input class="text-sm bg-transparent border-b border-dashed border-slate-300 outline-none" placeholder="+ 添加技能签..." type="text"/>
</div>
<p class="text-xs text-slate-400">系统将利用 AI 根据这些标签自动匹配相关简历的学生。</p>
</div>
<div class="pt-6 border-t flex space-x-4">
<button class="flex-1 py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition" type="button">存为草稿</button>
<button class="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition" onclick="window.location.href='admin_dashboard.html'" type="button">立即发布岗位</button>
</div>
</form>
</div>
</div>
</body>
</html>
